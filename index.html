<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thiệp cưới</title>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff}

/* INTRO */
#intro{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
opacity:1;
transition:1s;
}

#intro.hide{
opacity:0;
pointer-events:none;
}

button{
padding:12px 25px;
margin-top:20px;
border:none;
background:#fff;
}

/* HERO */
.hero{height:100vh;position:relative}
.hero img{
width:100%;height:100%;
object-fit:cover;
transform:scale(1);
transition:6s;
}

.hero.active img{
transform:scale(1.1);
}

/* SECTION */
.section{
padding:60px 20px;
opacity:0;
transform:translateY(50px);
transition:1s;
}
.section.show{
opacity:1;
transform:translateY(0);
}

/* MUSIC BTN */
.music-btn{
position:fixed;
top:20px;
right:20px;
background:#fff;
color:#000;
padding:10px;
border-radius:50%;
}

/* COUNTDOWN */
.countdown{
font-size:22px;
margin-top:20px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h2>Thiệp cưới</h2>
<button onclick="start()">Mở thiệp</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3">
</audio>
<div class="music-btn" onclick="toggleMusic()">♪</div>

<!-- HERO -->
<div class="hero" id="hero">
<img src="hero.jpg">
</div>

<!-- CONTENT -->
<div class="section">
<h2>Đếm ngược</h2>
<div id="countdown" class="countdown"></div>
</div>

<div class="section">
<h2>Story</h2>
<p>Chuyện tình bắt đầu từ một ngày rất bình thường...</p>
</div>

<script>

/* INTRO + MUSIC */
const music=document.getElementById("music");

function start(){
document.getElementById("intro").classList.add("hide");

setTimeout(()=>{
document.getElementById("hero").classList.add("active");
},300);

/* fade in nhạc */
music.volume=0;
music.play().catch(()=>{});

let v=0;
let fade=setInterval(()=>{
if(v<1){
v+=0.05;
music.volume=v;
}else{
clearInterval(fade);
}
},200);

}

/* MUSIC BTN */
function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

/* SCROLL (FIX XỊN) */
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
},{threshold:0.2});

document.querySelectorAll('.section').forEach(sec=>{
observer.observe(sec);
});

/* COUNTDOWN (CÓ GIÂY) */
const target=new Date("Apr 14, 2026 11:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let d=target-now;

let days=Math.floor(d/(1000*60*60*24));
let hours=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((d%(1000*60*60))/(1000*60));
let seconds=Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+" ngày "+
hours+" giờ "+
minutes+" phút "+
seconds+" giây";

},1000);

</script>

</body>
</html>
